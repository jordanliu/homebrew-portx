name: Formula CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    name: Audit formula
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Audit formula
        run: |
          TAP_PATH="$(brew --repository)/Library/Taps/jordanliu/homebrew-portx"
          mkdir -p "$(dirname "$TAP_PATH")"
          ln -s "$GITHUB_WORKSPACE" "$TAP_PATH"
          brew audit --formula --tap jordanliu/portx

      - name: Validate release metadata
        id: metadata
        shell: bash
        run: |
          ruby -ruri <<'RUBY' > "$GITHUB_OUTPUT"
          formula = File.read("Formula/portx.rb")
          urls = formula.scan(/^\s+url "([^"]+)"\s*$/).flatten
          shas = formula.scan(/^\s+sha256 "([^"]+)"\s*$/).flatten
          abort "Formula must contain exactly one url" unless urls.length == 1
          abort "Formula must contain exactly one sha256" unless shas.length == 1

          url = urls.first
          sha256 = shas.first
          placeholder_url = "https://github.com/jordanliu/portx/releases/download/v0.1.0/portx-0.1.0.tar.gz"

          unless sha256.match?(/\A[0-9a-f]{64}\z/)
            abort "Formula SHA256 is not a lowercase 64-character hexadecimal value"
          end

          if sha256 == "0" * 64
            abort "Placeholder formula URL changed" unless url == placeholder_url
            puts "placeholder=true"
            puts "version=0.1.0"
            puts "url=#{url}"
            puts "sha256=#{sha256}"
            exit
          end

          uri = URI.parse(url)
          abort "Formula URL must use HTTPS" unless uri.scheme == "https"
          abort "Formula URL must not contain query or fragment" if uri.query || uri.fragment

          match = %r{\Ahttps://github\.com/jordanliu/portx/releases/download/v(\d+\.\d+\.\d+)/portx-\1\.tar\.gz\z}.match(url)
          abort "Formula URL is not an exact PortX release archive" unless match

          puts "placeholder=false"
          puts "version=#{match[1]}"
          puts "url=#{url}"
          puts "sha256=#{sha256}"
          RUBY

          if grep -q '^placeholder=true$' "$GITHUB_OUTPUT"; then
            echo "The tap is awaiting the first real PortX release PR; build/install/test will run once CI updates the SHA256." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Verify release archive
        if: steps.metadata.outputs.placeholder != 'true'
        shell: bash
        env:
          RELEASE_URL: ${{ steps.metadata.outputs.url }}
          EXPECTED_SHA256: ${{ steps.metadata.outputs.sha256 }}
          VERSION: ${{ steps.metadata.outputs.version }}
        run: |
          curl --fail --location --retry 5 --retry-delay 2 --silent --show-error \
            "$RELEASE_URL" -o /tmp/portx-source.tar.gz
          printf '%s  %s\n' "$EXPECTED_SHA256" /tmp/portx-source.tar.gz | shasum -a 256 -c -
          tar -tzf /tmp/portx-source.tar.gz | grep -Fxq "portx-${VERSION}/go.mod"
          if tar -tzf /tmp/portx-source.tar.gz | grep -Eq '(^|/)\.git(/|$)'; then
            echo "Release archive contains Git metadata" >&2
            exit 1
          fi

      - name: Build, install, and test formula
        if: steps.metadata.outputs.placeholder != 'true'
        run: |
          brew install --build-from-source --formula jordanliu/portx/portx
          brew test jordanliu/portx/portx
          portx version
