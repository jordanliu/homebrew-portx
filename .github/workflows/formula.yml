name: Formula CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  audit:
    name: Audit formula
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Audit formula
        run: |
          TAP_PATH="$(brew --repository)/Library/Taps/jordanliu/homebrew-portx"
          mkdir -p "$(dirname "$TAP_PATH")"
          ln -s "$GITHUB_WORKSPACE" "$TAP_PATH"
          brew audit --formula --tap jordanliu/portx

      - name: Install and test formula
        run: |
          brew install --formula jordanliu/portx/portx
          brew test jordanliu/portx/portx
          portx version
